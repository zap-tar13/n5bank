name: Release N5Bank AppImage
on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Оновили версію checkout
      - name: setup node
        uses: actions/setup-node@v4 # Оновили версію setup-node
        with:
          node-version: 22 # Перейшли на стабільну 22-ку
      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: install dependencies
        run: |
          sudo apt-get update
          # Встановлюємо 4.1 для нових Ubuntu
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: build
        run: npm install && npm run tauri build
