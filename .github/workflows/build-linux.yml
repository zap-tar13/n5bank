name: Release N5Bank AppImage
on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libjavascriptcoregtk-4.1-dev soup-2.4
      - name: build
        run: |
          npm install
          npx next build
          npx tauri build
      
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: N5Bank-Linux-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
